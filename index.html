<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MQTT Signal Monitor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"
        type="text/javascript"></script>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #222;
            transition: background-color 0.5s;
            display: flex;
            flex-direction: column;
            /* 縦に並べる */
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
        }

        /* 上段：固定文字列 */
        #fixed-title {
            font-size: 5vw;
            color: rgba(255, 255, 255, 0.7);
            /* 少し透けさせる */
            margin-bottom: 5vh;
            text-transform: uppercase;
            letter-spacing: 0.5vw;
        }

        /* 下段：変動する大きな文字 */
        #message {
            font-size: 10vw;
            font-weight: bold;
            color: white;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            text-align: center;
            line-height: 1;
        }

        #status {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: white;
            font-size: 12px;
            opacity: 0.3;
        }
    </style>
</head>

<body>
    <div id="fixed-title">現在の調子</div>

    <div id="message">待機中</div>

    <div id="status">接続中...</div>
    <audio id="alertSound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

    <script>
        const MQTT_HOST = "public.cloud.shiftr.io";
        const MQTT_PORT = 443;
        const TOPIC = "Dorugebusha8/signal";
        const CLIENT_ID = "tablet_" + Math.random().toString(16).substr(2, 8);

        const client = new Paho.MQTT.Client("wss://" + MQTT_HOST + ":" + MQTT_PORT + "/mqtt", CLIENT_ID);

        const signalMap = {
            "red": { color: "#e53935", text: "☠️危険物☠️", sound: "cartoon/continuous_slide_whistle.ogg" },
            "blue": { color: "#1e88e5", text: "😑悪くはない😑", sound: "cartoon/cowbell_ringing.ogg" },
            "green": { color: "#43a047", text: "🙂話しかけてよし🙂", sound: "cartoon/cowbell_ringing.ogg" },
            "yellow": { color: "#fdd835", text: "⚠️取り扱い注意⚠️", sound: "cartoon/clown_horn.ogg" },
            "bomb": { color: "#212121", text: "💣爆発寸前💣", sound: "alarms/bugle_tune.ogg" },
            "unknown": { color: "#eeeeee", text: "❓わからん❓", sound: "cartoon/cartoon_boing.ogg" },
            "reload": { color: "#333", text: "🔄再読み込み🔄", sound: "alarms/beep_short.ogg" },
            // "contact": { color: "#5e35b1", text: "📧業務連絡📧\n", sound: "notifications/simple_notification.ogg" }
        };

        // contactメッセージを受け付けるかどうかの制御フラグ
        // この行をコメントアウトするとcontactメッセージを無効化します
        // const ENABLE_CONTACT_MESSAGES = true;

        client.onMessageArrived = (message) => {
            const payload = message.payloadString.trim();
            let command = payload.toLowerCase();
            let contactContent = "";

            // contactメッセージの場合、連絡内容を抽出
            if (command.startsWith("contact:")) {
                command = "contact";
                contactContent = payload.substring(8).trim();
            }

            const config = signalMap[command];

            if (config) {
                document.body.style.backgroundColor = config.color;
                textColor = (command === "yellow" || command === "unknown") ? "#333" : "white";
                document.getElementById('fixed-title').style.color = textColor;

                // contactメッセージの場合は連絡内容を表示
                if (command === "contact" && contactContent) {
                    // セキュリティ対策：文字数制限とサニタイズ
                    const maxLength = 50;
                    const sanitizedContent = contactContent
                        .replace(/[<>]/g, '')  // HTMLタグを除去
                        .replace(/javascript:/gi, '')  // JavaScriptプロトコルを除去
                        .replace(/on\w+=/gi, '')  // イベントハンドラを除去
                        .slice(0, maxLength);  // 文字数制限
                    
                    document.getElementById('message').innerText = config.text + sanitizedContent;
                } else {
                    document.getElementById('message').innerText = config.text;
                }

                document.getElementById('message').style.color = textColor;
                document.getElementById('status').style.color = textColor;

                // 音の鳴らし分け
                if (config.sound) {
                    const audio = document.getElementById('alertSound');
                    audio.src = "https://actions.google.com/sounds/v1/" + config.sound;
                    audio.play().catch(e => { });
                }
            }
            document.getElementById('status').innerText = "最終受信: " + payload;

            // 黒信号の場合は3秒間だけ全画面を暗転
            if (command === "black") {
                // 現在の状態を保存してから暗転
                const originalBgColor = document.body.style.backgroundColor;
                const originalTitle = document.getElementById('fixed-title').innerText;
                const originalMessage = document.getElementById('message').innerText;
                const originalStatus = document.getElementById('status').innerText;

                document.getElementById('fixed-title').innerText = "";
                document.getElementById('message').innerText = "";
                document.getElementById('status').innerText = "";
                document.body.style.backgroundColor = "#000";

                setTimeout(() => {
                    document.body.style.backgroundColor = originalBgColor;
                    setTimeout(() => {
                        document.getElementById('fixed-title').innerText = originalTitle;
                        document.getElementById('message').innerText = originalMessage;
                        document.getElementById('status').innerText = originalStatus;
                    }, 500);
                }, 3000);
            }

            // リロードコマンドの場合は5秒後にページをリロード
            if (command === "reload") {
                setTimeout(() => {
                    location.reload();
                }, 5000);
            }
        };

        client.onConnectionLost = () => {
            document.getElementById('status').innerText = "再接続中...";
            setTimeout(connect, 5000);
        };

        function connect() {
            client.connect({
                useSSL: true,
                onSuccess: () => {
                    client.subscribe(TOPIC);
                    document.getElementById('status').innerText = "接続済み";
                },
                userName: "public",
                password: "public"
            });
        }
        connect();
    </script>
</body>

</html>
