<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MQTT Signal Monitor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #222; 
            transition: background-color 0.5s;
            display: flex; flex-direction: column; /* 縦に並べる */
            align-items: center; justify-content: center;
            font-family: sans-serif;
        }

        /* 上段：固定文字列 */
        #fixed-title {
            font-size: 5vw;
            color: rgba(255, 255, 255, 0.7); /* 少し透けさせる */
            margin-bottom: 2vh;
            text-transform: uppercase;
            letter-spacing: 0.5vw;
        }

        /* 下段：変動する大きな文字 */
        #message {
            font-size: 25vw;
            font-weight: bold;
            color: white;
            text-shadow: 0 4px 15px rgba(0,0,0,0.4);
            text-align: center;
            line-height: 1;
        }

        #status { 
            position: absolute; bottom: 10px; left: 10px; 
            color: white; font-size: 12px; opacity: 0.3; 
        }
    </style>
</head>
<body>
    <div id="fixed-title">多希子の調子</div>
    
    <div id="message">待機中</div>
    
    <div id="status">接続中...</div>
    <audio id="alertSound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

    <script>
        const MQTT_HOST = "public.cloud.shiftr.io";
        const MQTT_PORT = 443;
        const TOPIC = "Dorugebusha8/signal";
        const CLIENT_ID = "tablet_" + Math.random().toString(16).substr(2, 8);

        const client = new Paho.MQTT.Client("wss://" + MQTT_HOST + ":" + MQTT_PORT + "/mqtt", CLIENT_ID);

        const signalMap = {
            "red":    { color: "#e53935", text: "☠️危険物☠️" },
            "blue":   { color: "#1e88e5", text: "😑悪くはない😑" },
            "green":  { color: "#43a047", text: "🙂話しかけてよし🙂" },
            "yellow": { color: "#fdd835", text: "⚠️取り扱い注意⚠️" },
            "black":  { color: "#212121", text: "💣爆発寸前💣" },
            "unknown":  { color: "#ffffff", text: "❓わからん❓" }
        };

        client.onMessageArrived = (message) => {
            const command = message.payloadString.trim().toLowerCase();
            const config = signalMap[command];

            if (config) {
                document.body.style.backgroundColor = config.color;
                document.getElementById('message').innerText = config.text;
                document.getElementById('message').style.color = (command === "yellow") ? "#333" : "white";

                const audio = document.getElementById('alertSound');
                audio.play().catch(e => {});
            }
            document.getElementById('status').innerText = "最終受信: " + command;
        };

        client.onConnectionLost = () => {
            document.getElementById('status').innerText = "再接続中...";
            setTimeout(connect, 5000);
        };

        function connect() {
            client.connect({
                useSSL: true,
                onSuccess: () => {
                    client.subscribe(TOPIC);
                    document.getElementById('status').innerText = "接続済み";
                },
                userName: "public",
                password: "public"
            });
        }
        connect();
    </script>
</body>
</html>
